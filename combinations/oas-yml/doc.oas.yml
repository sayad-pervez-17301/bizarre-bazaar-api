openapi: 3.0.3
info:
  title: Bizarre Bazaar API
  version: 1.0.0
  description: 'The Bizarre Bazaar API is a RESTful service for managing six unique collections: Fruits, Vegetables, Legumes, Colors, Animals, and Movies. Each collection supports full CRUD operations with
    pagination and sorting.'
servers:
- url: /
  description: Current host
security:
- apiKeyAuth: []
paths:
  /fruits:
    get:
      tags:
      - Fruits
      summary: List all fruits
      description: Manage your fruit collection.
      operationId: listFruits
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of fruits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id001
                      $ref: '#/components/schemas/Fruit'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id003
                  id: 1
                  name: Toyota
                  origin: Japan
                  founded: 1937
                  horsepower: 203
                  topSpeed: 180 km/h
                - id: 2
                  name: BMW
                  origin: Germany
                  founded: 1916
                  horsepower: 335
                  topSpeed: 250 km/h
                total: 5
                limit: 10
                offset: 0
        '401': &id002
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Fruits
      summary: Create a fruit
      description: Add a new fruit to the collection.
      operationId: createFruit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FruitCreate'
      responses:
        '201':
          description: Fruit created successfully
          content:
            application/json:
              schema: *id001
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id002
  /fruits/{fruitId}:
    get:
      tags:
      - Fruits
      summary: Get a fruit by ID
      description: Retrieve a single fruit by its unique identifier.
      operationId: getFruit
      parameters:
      - &id004
        name: fruitId
        in: path
        required: true
        description: Unique fruit identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single fruit
          content:
            application/json:
              schema: *id001
              example: *id003
        '401': *id002
        '404': &id005
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Fruits
      summary: Delete a fruit
      description: Permanently remove a fruit from the collection.
      operationId: deleteFruit
      parameters:
      - *id004
      responses:
        '204':
          description: Fruit deleted successfully
        '401': *id002
        '404': *id005
  /vegetables:
    get:
      tags:
      - Vegetables
      summary: List all vegetables
      description: Browse and manage vegetables.
      operationId: listVegetables
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of vegetables
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id006
                      $ref: '#/components/schemas/Vegetable'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id008
                  id: 1
                  name: Germany
                  leader: Adolf Hitler
                  joinedAxis: '1936'
                  population: 69000000
                  capitalCity: Berlin
                - id: 2
                  name: Italy
                  leader: Benito Mussolini
                  joinedAxis: '1936'
                  population: 45000000
                  capitalCity: Rome
                total: 5
                limit: 10
                offset: 0
        '401': &id007
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Vegetables
      summary: Create a vegetable
      description: Add a new vegetable to the collection.
      operationId: createVegetable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VegetableCreate'
      responses:
        '201':
          description: Vegetable created successfully
          content:
            application/json:
              schema: *id006
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id007
  /vegetables/{vegetableId}:
    get:
      tags:
      - Vegetables
      summary: Get a vegetable by ID
      description: Retrieve a single vegetable by its unique identifier.
      operationId: getVegetable
      parameters:
      - &id009
        name: vegetableId
        in: path
        required: true
        description: Unique vegetable identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single vegetable
          content:
            application/json:
              schema: *id006
              example: *id008
        '401': *id007
        '404': &id010
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Vegetables
      summary: Delete a vegetable
      description: Permanently remove a vegetable from the collection.
      operationId: deleteVegetable
      parameters:
      - *id009
      responses:
        '204':
          description: Vegetable deleted successfully
        '401': *id007
        '404': *id010
  /legumes:
    get:
      tags:
      - Legumes
      summary: List all legumes
      description: Explore the legume catalog.
      operationId: listLegumes
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of legumes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id011
                      $ref: '#/components/schemas/Legume'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id013
                  id: 1
                  name: Mercury
                  distanceFromSunKm: 57900000
                  moons: 0
                  orbitalPeriodDays: 88.0
                  diameter: 4,879 km
                - id: 2
                  name: Venus
                  distanceFromSunKm: 108200000
                  moons: 0
                  orbitalPeriodDays: 225.0
                  diameter: 12,104 km
                total: 5
                limit: 10
                offset: 0
        '401': &id012
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Legumes
      summary: Create a legume
      description: Add a new legume to the collection.
      operationId: createLegume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegumeCreate'
      responses:
        '201':
          description: Legume created successfully
          content:
            application/json:
              schema: *id011
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id012
  /legumes/{legumeId}:
    get:
      tags:
      - Legumes
      summary: Get a legume by ID
      description: Retrieve a single legume by its unique identifier.
      operationId: getLegume
      parameters:
      - &id014
        name: legumeId
        in: path
        required: true
        description: Unique legume identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single legume
          content:
            application/json:
              schema: *id011
              example: *id013
        '401': *id012
        '404': &id015
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Legumes
      summary: Delete a legume
      description: Permanently remove a legume from the collection.
      operationId: deleteLegume
      parameters:
      - *id014
      responses:
        '204':
          description: Legume deleted successfully
        '401': *id012
        '404': *id015
  /colors:
    get:
      tags:
      - Colors
      summary: List all colors
      description: Discover and manage colors.
      operationId: listColors
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of colors
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id016
                      $ref: '#/components/schemas/Color'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id018
                  id: 1
                  name: Leonhard Euler
                  nationality: Swiss
                  birthYear: 1707
                  knownFor: Euler's formula
                  field: Analysis
                - id: 2
                  name: Carl Friedrich Gauss
                  nationality: German
                  birthYear: 1777
                  knownFor: Gaussian distribution
                  field: Number Theory
                total: 5
                limit: 10
                offset: 0
        '401': &id017
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Colors
      summary: Create a color
      description: Add a new color to the collection.
      operationId: createColor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColorCreate'
      responses:
        '201':
          description: Color created successfully
          content:
            application/json:
              schema: *id016
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id017
  /colors/{colorId}:
    get:
      tags:
      - Colors
      summary: Get a color by ID
      description: Retrieve a single color by its unique identifier.
      operationId: getColor
      parameters:
      - &id019
        name: colorId
        in: path
        required: true
        description: Unique color identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single color
          content:
            application/json:
              schema: *id016
              example: *id018
        '401': *id017
        '404': &id020
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Colors
      summary: Delete a color
      description: Permanently remove a color from the collection.
      operationId: deleteColor
      parameters:
      - *id019
      responses:
        '204':
          description: Color deleted successfully
        '401': *id017
        '404': *id020
  /animals:
    get:
      tags:
      - Animals
      summary: List all animals
      description: Catalog of animals.
      operationId: listAnimals
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of animals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id021
                      $ref: '#/components/schemas/Animal'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id023
                  id: 1
                  name: Python
                  creator: Guido van Rossum
                  yearCreated: 1991
                  paradigm: Multi-paradigm
                  typing: Dynamic
                - id: 2
                  name: JavaScript
                  creator: Brendan Eich
                  yearCreated: 1995
                  paradigm: Multi-paradigm
                  typing: Dynamic
                total: 5
                limit: 10
                offset: 0
        '401': &id022
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Animals
      summary: Create a animal
      description: Add a new animal to the collection.
      operationId: createAnimal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnimalCreate'
      responses:
        '201':
          description: Animal created successfully
          content:
            application/json:
              schema: *id021
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id022
  /animals/{animalId}:
    get:
      tags:
      - Animals
      summary: Get a animal by ID
      description: Retrieve a single animal by its unique identifier.
      operationId: getAnimal
      parameters:
      - &id024
        name: animalId
        in: path
        required: true
        description: Unique animal identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single animal
          content:
            application/json:
              schema: *id021
              example: *id023
        '401': *id022
        '404': &id025
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Animals
      summary: Delete a animal
      description: Permanently remove a animal from the collection.
      operationId: deleteAnimal
      parameters:
      - *id024
      responses:
        '204':
          description: Animal deleted successfully
        '401': *id022
        '404': *id025
  /movies:
    get:
      tags:
      - Movies
      summary: List all movies
      description: Browse the movie database.
      operationId: listMovies
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of movies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id026
                      $ref: '#/components/schemas/Movie'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id028
                  id: 1
                  name: Hydrogen
                  symbol: H
                  atomicNumber: 1
                  atomicMass: 1.008
                  category: Nonmetal
                - id: 2
                  name: Helium
                  symbol: He
                  atomicNumber: 2
                  atomicMass: 4.003
                  category: Noble Gas
                total: 5
                limit: 10
                offset: 0
        '401': &id027
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Movies
      summary: Create a movie
      description: Add a new movie to the collection.
      operationId: createMovie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieCreate'
      responses:
        '201':
          description: Movie created successfully
          content:
            application/json:
              schema: *id026
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id027
  /movies/{movieId}:
    get:
      tags:
      - Movies
      summary: Get a movie by ID
      description: Retrieve a single movie by its unique identifier.
      operationId: getMovie
      parameters:
      - &id029
        name: movieId
        in: path
        required: true
        description: Unique movie identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single movie
          content:
            application/json:
              schema: *id026
              example: *id028
        '401': *id027
        '404': &id030
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Movies
      summary: Delete a movie
      description: Permanently remove a movie from the collection.
      operationId: deleteMovie
      parameters:
      - *id029
      responses:
        '204':
          description: Movie deleted successfully
        '401': *id027
        '404': *id030
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Bizarre-Key
      description: API key for authentication
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return (1-50)
      schema:
        type: integer
        default: 10
        maximum: 50
    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip for pagination
      schema:
        type: integer
        default: 0
    SortParam:
      name: sort
      in: query
      description: Sort order
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - message
    Fruit:
      type: object
      properties:
        id:
          type: integer
          description: Unique fruit identifier
          example: 1
        name:
          type: string
          description: Name of the fruit
          example: Toyota
        origin:
          type: string
          description: Country where the fruit grows
          example: Japan
        founded:
          type: integer
          description: Year first cultivated
          example: 1937
        horsepower:
          type: integer
          description: Vigor rating
          example: 203
        topSpeed:
          type: string
          description: Maximum ripening velocity
          example: 180 km/h
      required:
      - id
      - name
    FruitCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the fruit
          example: Toyota
        origin:
          type: string
          description: Country where the fruit grows
          example: Japan
        founded:
          type: integer
          description: Year first cultivated
          example: 1937
        horsepower:
          type: integer
          description: Vigor rating
          example: 203
        topSpeed:
          type: string
          description: Maximum ripening velocity
          example: 180 km/h
      required:
      - name
    Vegetable:
      type: object
      properties:
        id:
          type: integer
          description: Unique vegetable identifier
          example: 1
        name:
          type: string
          description: Name of the vegetable
          example: Germany
        leader:
          type: string
          description: Head gardener responsible for this vegetable
          example: Adolf Hitler
        joinedAxis:
          type: string
          description: Year this vegetable joined the garden alliance
          example: '1936'
        population:
          type: integer
          description: Number of seeds
          example: 69000000
        capitalCity:
          type: string
          description: Primary growing region
          example: Berlin
      required:
      - id
      - name
    VegetableCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the vegetable
          example: Germany
        leader:
          type: string
          description: Head gardener responsible for this vegetable
          example: Adolf Hitler
        joinedAxis:
          type: string
          description: Year this vegetable joined the garden alliance
          example: '1936'
        population:
          type: integer
          description: Number of seeds
          example: 69000000
        capitalCity:
          type: string
          description: Primary growing region
          example: Berlin
      required:
      - name
    Legume:
      type: object
      properties:
        id:
          type: integer
          description: Unique legume identifier
          example: 1
        name:
          type: string
          description: Name of the legume
          example: Mercury
        distanceFromSunKm:
          type: integer
          description: Distance from the vine in km
          example: 57900000
        moons:
          type: integer
          description: Number of companion pods
          example: 0
        orbitalPeriodDays:
          type: number
          description: Growth cycle in days
          example: 88.0
        diameter:
          type: string
          description: Legume diameter
          example: 4,879 km
      required:
      - id
      - name
    LegumeCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the legume
          example: Mercury
        distanceFromSunKm:
          type: integer
          description: Distance from the vine in km
          example: 57900000
        moons:
          type: integer
          description: Number of companion pods
          example: 0
        orbitalPeriodDays:
          type: number
          description: Growth cycle in days
          example: 88.0
        diameter:
          type: string
          description: Legume diameter
          example: 4,879 km
      required:
      - name
    Color:
      type: object
      properties:
        id:
          type: integer
          description: Unique color identifier
          example: 1
        name:
          type: string
          description: Name of the color
          example: Leonhard Euler
        nationality:
          type: string
          description: Color origin country
          example: Swiss
        birthYear:
          type: integer
          description: Year the color was first observed
          example: 1707
        knownFor:
          type: string
          description: What this color is famous for
          example: Euler's formula
        field:
          type: string
          description: Color family
          example: Analysis
      required:
      - id
      - name
    ColorCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the color
          example: Leonhard Euler
        nationality:
          type: string
          description: Color origin country
          example: Swiss
        birthYear:
          type: integer
          description: Year the color was first observed
          example: 1707
        knownFor:
          type: string
          description: What this color is famous for
          example: Euler's formula
        field:
          type: string
          description: Color family
          example: Analysis
      required:
      - name
    Animal:
      type: object
      properties:
        id:
          type: integer
          description: Unique animal identifier
          example: 1
        name:
          type: string
          description: Name of the animal
          example: Python
        creator:
          type: string
          description: Who discovered this animal
          example: Guido van Rossum
        yearCreated:
          type: integer
          description: Year of discovery
          example: 1991
        paradigm:
          type: string
          description: Behavioral pattern
          example: Multi-paradigm
        typing:
          type: string
          description: Classification system
          example: Dynamic
      required:
      - id
      - name
    AnimalCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the animal
          example: Python
        creator:
          type: string
          description: Who discovered this animal
          example: Guido van Rossum
        yearCreated:
          type: integer
          description: Year of discovery
          example: 1991
        paradigm:
          type: string
          description: Behavioral pattern
          example: Multi-paradigm
        typing:
          type: string
          description: Classification system
          example: Dynamic
      required:
      - name
    Movie:
      type: object
      properties:
        id:
          type: integer
          description: Unique movie identifier
          example: 1
        name:
          type: string
          description: Title of the movie
          example: Hydrogen
        symbol:
          type: string
          description: Movie rating symbol
          example: H
        atomicNumber:
          type: integer
          description: Box office ranking
          example: 1
        atomicMass:
          type: number
          description: Critical mass score
          example: 1.008
        category:
          type: string
          description: Genre classification
          example: Nonmetal
      required:
      - id
      - name
    MovieCreate:
      type: object
      properties:
        name:
          type: string
          description: Title of the movie
          example: Hydrogen
        symbol:
          type: string
          description: Movie rating symbol
          example: H
        atomicNumber:
          type: integer
          description: Box office ranking
          example: 1
        atomicMass:
          type: number
          description: Critical mass score
          example: 1.008
        category:
          type: string
          description: Genre classification
          example: Nonmetal
      required:
      - name
  responses:
    BadRequest:
      description: Bad Request - invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: Invalid request parameters
    Unauthorized:
      description: Unauthorized - missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Missing or invalid API key
    NotFound:
      description: Not Found - the requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: The requested resource was not found
    RateLimited:
      description: Rate Limited - too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate_limited
            message: Too many requests. Please wait and try again.
