openapi: 3.0.3
info:
  title: Bizarre Bazaar API - Legumes
  version: 1.0.0
  description: Explore the legume catalog. Part of the Bizarre Bazaar API.
servers:
- url: /
  description: Current host
security:
- apiKeyAuth: []
paths:
  /legumes:
    get:
      tags:
      - Legumes
      summary: List all legumes
      description: Explore the legume catalog.
      operationId: listLegumes
      parameters:
      - name: limit
        in: query
        description: Max items to return (1-50)
        schema:
          type: integer
          default: 10
          maximum: 50
      - name: offset
        in: query
        description: Items to skip
        schema:
          type: integer
          default: 0
      - name: sort
        in: query
        description: Sort order
        schema:
          type: string
          enum:
          - asc
          - desc
          default: asc
      responses:
        '200':
          description: A paginated list of legumes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id002
                      type: object
                      properties:
                        id:
                          type: integer
                          description: Unique legume identifier
                          example: 1
                        name:
                          type: string
                          description: Name of the legume
                          example: Mercury
                        distanceFromSunKm:
                          type: integer
                          description: Distance from the vine in km
                          example: 57900000
                        moons:
                          type: integer
                          description: Number of companion pods
                          example: 0
                        orbitalPeriodDays:
                          type: number
                          description: Growth cycle in days
                          example: 88.0
                        diameter:
                          type: string
                          description: Legume diameter
                          example: 4,879 km
                      required:
                      - id
                      - name
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id004
                  id: 1
                  name: Mercury
                  distanceFromSunKm: 57900000
                  moons: 0
                  orbitalPeriodDays: 88.0
                  diameter: 4,879 km
                - id: 2
                  name: Venus
                  distanceFromSunKm: 108200000
                  moons: 0
                  orbitalPeriodDays: 225.0
                  diameter: 12,104 km
                total: 5
                limit: 10
                offset: 0
        '401': &id003
          description: Unauthorized - missing or invalid API key
          content:
            application/json:
              schema: &id001
                type: object
                properties:
                  error:
                    type: string
                    description: Error code
                  message:
                    type: string
                    description: Human-readable error message
                required:
                - error
                - message
        '429':
          description: Rate Limited - too many requests
          content:
            application/json:
              schema: *id001
    post:
      tags:
      - Legumes
      summary: Create a legume
      description: Add a new legume to the collection.
      operationId: createLegume
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name of the legume
                  example: Mercury
                distanceFromSunKm:
                  type: integer
                  description: Distance from the vine in km
                  example: 57900000
                moons:
                  type: integer
                  description: Number of companion pods
                  example: 0
                orbitalPeriodDays:
                  type: number
                  description: Growth cycle in days
                  example: 88.0
                diameter:
                  type: string
                  description: Legume diameter
                  example: 4,879 km
              required:
              - name
      responses:
        '201':
          description: Legume created successfully
          content:
            application/json:
              schema: *id002
        '400':
          description: Bad Request - invalid parameters
          content:
            application/json:
              schema: *id001
        '401': *id003
  /legumes/{legumeId}:
    get:
      tags:
      - Legumes
      summary: Get a legume by ID
      description: Retrieve a single legume by its unique identifier.
      operationId: getLegume
      parameters:
      - &id005
        name: legumeId
        in: path
        required: true
        description: Unique legume identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single legume
          content:
            application/json:
              schema: *id002
              example: *id004
        '401': *id003
        '404': &id006
          description: Not Found - resource does not exist
          content:
            application/json:
              schema: *id001
    delete:
      tags:
      - Legumes
      summary: Delete a legume
      description: Permanently remove a legume from the collection.
      operationId: deleteLegume
      parameters:
      - *id005
      responses:
        '204':
          description: Legume deleted successfully
        '401': *id003
        '404': *id006
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Bizarre-Key
      description: API key for authentication
