openapi: 3.0.3
info:
  title: Bizarre Bazaar API - Animals
  version: 1.0.0
  description: Catalog of animals. Part of the Bizarre Bazaar API.
servers:
- url: /
  description: Current host
security:
- apiKeyAuth: []
paths:
  /animals:
    get:
      tags:
      - Animals
      summary: List all animals
      description: Catalog of animals.
      operationId: listAnimals
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of animals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id001
                      $ref: '#/components/schemas/Animal'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id003
                  id: 1
                  name: Python
                  creator: Guido van Rossum
                  yearCreated: 1991
                  paradigm: Multi-paradigm
                  typing: Dynamic
                - id: 2
                  name: JavaScript
                  creator: Brendan Eich
                  yearCreated: 1995
                  paradigm: Multi-paradigm
                  typing: Dynamic
                total: 5
                limit: 10
                offset: 0
        '401': &id002
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Animals
      summary: Create a animal
      description: Add a new animal to the collection.
      operationId: createAnimal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnimalCreate'
      responses:
        '201':
          description: Animal created successfully
          content:
            application/json:
              schema: *id001
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id002
  /animals/{animalId}:
    get:
      tags:
      - Animals
      summary: Get a animal by ID
      description: Retrieve a single animal by its unique identifier.
      operationId: getAnimal
      parameters:
      - &id004
        name: animalId
        in: path
        required: true
        description: Unique animal identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single animal
          content:
            application/json:
              schema: *id001
              example: *id003
        '401': *id002
        '404': &id005
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Animals
      summary: Delete a animal
      description: Permanently remove a animal from the collection.
      operationId: deleteAnimal
      parameters:
      - *id004
      responses:
        '204':
          description: Animal deleted successfully
        '401': *id002
        '404': *id005
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Bizarre-Key
      description: API key for authentication
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return (1-50)
      schema:
        type: integer
        default: 10
        maximum: 50
    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip for pagination
      schema:
        type: integer
        default: 0
    SortParam:
      name: sort
      in: query
      description: Sort order
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - message
    Animal:
      type: object
      properties:
        id:
          type: integer
          description: Unique animal identifier
          example: 1
        name:
          type: string
          description: Name of the animal
          example: Python
        creator:
          type: string
          description: Who discovered this animal
          example: Guido van Rossum
        yearCreated:
          type: integer
          description: Year of discovery
          example: 1991
        paradigm:
          type: string
          description: Behavioral pattern
          example: Multi-paradigm
        typing:
          type: string
          description: Classification system
          example: Dynamic
      required:
      - id
      - name
    AnimalCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the animal
          example: Python
        creator:
          type: string
          description: Who discovered this animal
          example: Guido van Rossum
        yearCreated:
          type: integer
          description: Year of discovery
          example: 1991
        paradigm:
          type: string
          description: Behavioral pattern
          example: Multi-paradigm
        typing:
          type: string
          description: Classification system
          example: Dynamic
      required:
      - name
  responses:
    BadRequest:
      description: Bad Request - invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: Invalid request parameters
    Unauthorized:
      description: Unauthorized - missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Missing or invalid API key
    NotFound:
      description: Not Found - the requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: The requested resource was not found
    RateLimited:
      description: Rate Limited - too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate_limited
            message: Too many requests. Please wait and try again.
