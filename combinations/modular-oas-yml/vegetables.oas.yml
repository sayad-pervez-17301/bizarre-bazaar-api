openapi: 3.0.3
info:
  title: Bizarre Bazaar API - Vegetables
  version: 1.0.0
  description: Browse and manage vegetables. Part of the Bizarre Bazaar API.
servers:
- url: /
  description: Current host
security:
- apiKeyAuth: []
paths:
  /vegetables:
    get:
      tags:
      - Vegetables
      summary: List all vegetables
      description: Browse and manage vegetables.
      operationId: listVegetables
      parameters:
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/OffsetParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: A paginated list of vegetables
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: &id001
                      $ref: '#/components/schemas/Vegetable'
                  total:
                    type: integer
                    description: Total number of items
                  limit:
                    type: integer
                    description: Items per page
                  offset:
                    type: integer
                    description: Offset from start
              example:
                data:
                - &id003
                  id: 1
                  name: Germany
                  leader: Adolf Hitler
                  joinedAxis: '1936'
                  population: 69000000
                  capitalCity: Berlin
                - id: 2
                  name: Italy
                  leader: Benito Mussolini
                  joinedAxis: '1936'
                  population: 45000000
                  capitalCity: Rome
                total: 5
                limit: 10
                offset: 0
        '401': &id002
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
    post:
      tags:
      - Vegetables
      summary: Create a vegetable
      description: Add a new vegetable to the collection.
      operationId: createVegetable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VegetableCreate'
      responses:
        '201':
          description: Vegetable created successfully
          content:
            application/json:
              schema: *id001
        '400':
          $ref: '#/components/responses/BadRequest'
        '401': *id002
  /vegetables/{vegetableId}:
    get:
      tags:
      - Vegetables
      summary: Get a vegetable by ID
      description: Retrieve a single vegetable by its unique identifier.
      operationId: getVegetable
      parameters:
      - &id004
        name: vegetableId
        in: path
        required: true
        description: Unique vegetable identifier
        schema:
          type: integer
      responses:
        '200':
          description: A single vegetable
          content:
            application/json:
              schema: *id001
              example: *id003
        '401': *id002
        '404': &id005
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Vegetables
      summary: Delete a vegetable
      description: Permanently remove a vegetable from the collection.
      operationId: deleteVegetable
      parameters:
      - *id004
      responses:
        '204':
          description: Vegetable deleted successfully
        '401': *id002
        '404': *id005
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Bizarre-Key
      description: API key for authentication
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return (1-50)
      schema:
        type: integer
        default: 10
        maximum: 50
    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip for pagination
      schema:
        type: integer
        default: 0
    SortParam:
      name: sort
      in: query
      description: Sort order
      schema:
        type: string
        enum:
        - asc
        - desc
        default: asc
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
      required:
      - error
      - message
    Vegetable:
      type: object
      properties:
        id:
          type: integer
          description: Unique vegetable identifier
          example: 1
        name:
          type: string
          description: Name of the vegetable
          example: Germany
        leader:
          type: string
          description: Head gardener responsible for this vegetable
          example: Adolf Hitler
        joinedAxis:
          type: string
          description: Year this vegetable joined the garden alliance
          example: '1936'
        population:
          type: integer
          description: Number of seeds
          example: 69000000
        capitalCity:
          type: string
          description: Primary growing region
          example: Berlin
      required:
      - id
      - name
    VegetableCreate:
      type: object
      properties:
        name:
          type: string
          description: Name of the vegetable
          example: Germany
        leader:
          type: string
          description: Head gardener responsible for this vegetable
          example: Adolf Hitler
        joinedAxis:
          type: string
          description: Year this vegetable joined the garden alliance
          example: '1936'
        population:
          type: integer
          description: Number of seeds
          example: 69000000
        capitalCity:
          type: string
          description: Primary growing region
          example: Berlin
      required:
      - name
  responses:
    BadRequest:
      description: Bad Request - invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: bad_request
            message: Invalid request parameters
    Unauthorized:
      description: Unauthorized - missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Missing or invalid API key
    NotFound:
      description: Not Found - the requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: The requested resource was not found
    RateLimited:
      description: Rate Limited - too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate_limited
            message: Too many requests. Please wait and try again.
